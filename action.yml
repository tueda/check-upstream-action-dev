name: Check Upstream
description: |
  Check upstream and create a pull request if merge is possible,
  or open an issue when conflicts are detected.

branding:
  icon: git-merge
  color: blue

inputs:
  upstream-repository:
    description: |
      The upstream repository to check against.
      For example, 'https://github.com/owner/repo.git' or 'owner/repo'
    required: true

  upstream-branch:
    description: |
      The upstream branch to check against.
      The default is the default branch of the upstream repository.
    default: ''

  merge-commit-message:
    description: The commit message for the merge commit.
    default: |
      Merge branch '$upstream_branch' from upstream '$upstream_repository'

      $upstream_commit_url

  pull-request-title:
    description: The title for the pull request.
    default: '[check-upstream] Merge changes from upstream'

  pull-request-branch:
    description: The branch name for the pull request.
    default: create-pull-request/check-upstream

  issue-title:
    description: The title for the issue when conflicts are detected.
    default: '[check-upstream] Merge conflicts with upstream'

  author:
    description: The author name and email address for the merge commit.
    default: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'

  committer:
    description: The committer name and email address for the merge commit.
    default: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'

  branch-token:
    description: The token used to create or update the pull request branch.
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Configuration
      id: config
      shell: bash
      env:
        UPSTREAM_REPOSITORY: ${{ inputs.upstream-repository }}
        AUTHOR: ${{ inputs.author }}
        COMMITTER: ${{ inputs.committer }}
      run: |
        validate_single_line_input() {
          local name="$1"
          local value="$2"

          if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
            echo "::error::input '$name' must be a single line"
            exit 1
          fi
        }

        validate_single_line_input upstream-repository "$UPSTREAM_REPOSITORY"
        validate_single_line_input author "$AUTHOR"
        validate_single_line_input committer "$COMMITTER"

        if [ -d .git ]; then
          echo "initialized=true" >>"$GITHUB_OUTPUT"
        else
          echo "initialized=false" >>"$GITHUB_OUTPUT"
        fi
        if [[ "$UPSTREAM_REPOSITORY" == http* ]]; then
          echo "upstream_url=$UPSTREAM_REPOSITORY" >>"$GITHUB_OUTPUT"
        else
          echo "upstream_url=https://github.com/$UPSTREAM_REPOSITORY.git" >>"$GITHUB_OUTPUT"
        fi
        author="$AUTHOR"
        author_name="${author%% <*}"
        author_email="${author#*<}"
        author_email="${author_email%>}"
        committer="$COMMITTER"
        committer_name="${committer%% <*}"
        committer_email="${committer#*<}"
        committer_email="${committer_email%>}"
        echo "author_name=$author_name" >>"$GITHUB_OUTPUT"
        echo "author_email=$author_email" >>"$GITHUB_OUTPUT"
        echo "committer_name=$committer_name" >>"$GITHUB_OUTPUT"
        echo "committer_email=$committer_email" >>"$GITHUB_OUTPUT"

    - name: Checkout the repository
      if: steps.config.outputs.initialized == 'false'
      uses: actions/checkout@v7.0.0
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Merge upstream
      id: merge
      shell: bash
      env:
        UPSTREAM_REPOSITORY: ${{ inputs.upstream-repository }}
        UPSTREAM_URL: ${{ steps.config.outputs.upstream_url }}
        UPSTREAM_BRANCH: ${{ inputs.upstream-branch }}
        MERGE_COMMIT_MESSAGE: ${{ inputs.merge-commit-message }}
        PULL_REQUEST_TITLE: ${{ inputs.pull-request-title }}
        ISSUE_TITLE: ${{ inputs.issue-title }}
        GIT_AUTHOR_NAME: ${{ steps.config.outputs.author_name }}
        GIT_AUTHOR_EMAIL: ${{ steps.config.outputs.author_email }}
        GIT_COMMITTER_NAME: ${{ steps.config.outputs.committer_name }}
        GIT_COMMITTER_EMAIL: ${{ steps.config.outputs.committer_email }}
      run: |
        upstream_repository="$UPSTREAM_REPOSITORY"
        upstream_url="$UPSTREAM_URL"

        if git remote get-url upstream >/dev/null 2>&1; then
          echo "::error::remote 'upstream' already exists"
          exit 1
        fi
        git remote add upstream "$upstream_url"
        git fetch upstream
        if [ -z "$UPSTREAM_BRANCH" ]; then
          upstream_branch=$(git ls-remote --symref upstream HEAD | sed -n 's|^ref: refs/heads/\([^[:space:]]*\).*|\1|p')
        else
          upstream_branch="$UPSTREAM_BRANCH"
        fi
        upstream_sha=$(git rev-parse "upstream/$upstream_branch")
        upstream_short_sha=$(git rev-parse --short "upstream/$upstream_branch")
        upstream_branch_url="${upstream_url%.git}/tree/$upstream_branch"
        upstream_commit_url="${upstream_url%.git}/commit/$upstream_sha"

        export upstream_repository
        export upstream_url
        export upstream_branch
        export upstream_sha
        export upstream_short_sha
        export upstream_branch_url
        export upstream_commit_url
        variables='$upstream_repository $upstream_url $upstream_branch $upstream_sha $upstream_short_sha $upstream_branch_url $upstream_commit_url'

        printf '%s\n' "$MERGE_COMMIT_MESSAGE" | envsubst "$variables" >/tmp/merge_commit_message.txt

        old_sha=$(git rev-parse HEAD)

        if git merge "upstream/$upstream_branch" -F /tmp/merge_commit_message.txt; then
          echo "conflict=false" >>"$GITHUB_OUTPUT"

          if git diff --quiet "$old_sha" HEAD; then
            git reset --hard "$old_sha"
          fi

          pull_request_title=$(printf '%s\n' "$PULL_REQUEST_TITLE" | envsubst "$variables")
          pull_request_title="${pull_request_title//$'\n'/ }"
          echo "pull_request_title=$pull_request_title" >>"$GITHUB_OUTPUT"

          {
            echo 'pull_request_body<<__CHECK_UPSTREAM_END__'
            echo '> [!IMPORTANT]'
            echo '> This pull request merges changes from the upstream repository.  '
            echo '> Please use **Create a merge commit**.  '
            echo '> Do not use **Squash and merge** or **Rebase and merge**, because doing so will not create a merge commit for this pull request.'
            echo
            echo "Upstream repository: [$upstream_repository]($upstream_url)  "
            echo "Upstream branch: [$upstream_branch]($upstream_branch_url)  "
            echo "Upstream commit: [$upstream_short_sha]($upstream_commit_url)"
            echo '__CHECK_UPSTREAM_END__'
          } >>"$GITHUB_OUTPUT"
        else
          echo "conflict=true" >>"$GITHUB_OUTPUT"

          {
            echo "### Merge conflict when merging [$upstream_repository@$upstream_short_sha]($upstream_commit_url)"
            echo
            echo '#### git status'
            echo
            echo '~~~~~~~~'
            git status
            echo '~~~~~~~~'
            echo
            echo '#### git diff'
            echo
            echo '~~~~~~~~'
            git diff "$old_sha"
            echo '~~~~~~~~'
          } >/tmp/conflict_issue_message.md
          git merge --abort

          {
            echo 'pull_request_title=INTERNAL ERROR'
            echo 'pull_request_body=INTERNAL ERROR'
          } >>"$GITHUB_OUTPUT"
        fi

        issue_title=$(printf '%s\n' "$ISSUE_TITLE" | envsubst "$variables")
        issue_title="${issue_title//$'\n'/ }"
        echo "issue_title=$issue_title" >>"$GITHUB_OUTPUT"

        issue_search_title_prefix="${ISSUE_TITLE%%\$*}"
        issue_search_title_prefix="${issue_search_title_prefix//$'\n'/ }"
        echo "issue_search_title_prefix=$issue_search_title_prefix" >>"$GITHUB_OUTPUT"

    - name: Create a pull request
      if: steps.merge.outputs.conflict == 'false'
      uses: peter-evans/create-pull-request@v8.1.1
      with:
        branch-token: ${{ inputs.branch-token }}
        committer: ${{ inputs.committer }}
        author: ${{ inputs.author }}
        branch: ${{ inputs.pull-request-branch }}
        delete-branch: true
        title: ${{ steps.merge.outputs.pull_request_title }}
        body: ${{ steps.merge.outputs.pull_request_body }}

    - name: Find an opened conflict issue
      id: find_issue
      uses: actions/github-script@v9.0.0
      env:
        ISSUE_SEARCH_TITLE_PREFIX: ${{ steps.merge.outputs.issue_search_title_prefix }}
      with:
        result-encoding: string
        script: |
          const titlePrefix = process.env.ISSUE_SEARCH_TITLE_PREFIX;
          if (!titlePrefix) {
            return 0;
          }
          let page = 1;
          let found = null;
          while (true) {
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
              page: page,
            });
            if (issues.length === 0) {
              break;
            }
            const match = issues.find(
              issue => !issue.pull_request && issue.title.startsWith(titlePrefix),
            );
            if (match) {
              found = match.number;
              break;
            }
            page++;
          }
          return found || 0;

    - name: Create a new conflict issue
      if: steps.merge.outputs.conflict == 'true' && steps.find_issue.outputs.result == '0'
      uses: peter-evans/create-issue-from-file@v6.0.0
      with:
        title: ${{ steps.merge.outputs.issue_title }}
        content-filepath: /tmp/conflict_issue_message.md

    - name: Update the conflict issue
      if: steps.merge.outputs.conflict == 'true' && steps.find_issue.outputs.result != '0'
      uses: actions/github-script@v9.0.0
      env:
        ISSUE_NUMBER: ${{ steps.find_issue.outputs.result }}
      with:
        script: |
          const fs = require('fs');
          const issue_number = Number(process.env.ISSUE_NUMBER);
          const body = fs.readFileSync('/tmp/conflict_issue_message.md', 'utf8');
          await github.rest.issues.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issue_number,
            body: body
          });

    - name: Close the conflict issue
      if: steps.merge.outputs.conflict == 'false' && steps.find_issue.outputs.result != '0'
      uses: actions/github-script@v9.0.0
      env:
        ISSUE_NUMBER: ${{ steps.find_issue.outputs.result }}
      with:
        script: |
          const issue_number = Number(process.env.ISSUE_NUMBER);
          await github.rest.issues.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issue_number,
            state: 'closed'
          });
